<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer Ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-opacity="0.3" />

  <!-- Stylized Route / Path Trace behind Pin -->
  <path d="M 120 380 Q 220 440 256 340 T 380 200" fill="none" stroke="#64748b" stroke-width="12" stroke-linecap="round" stroke-dasharray="2 20" opacity="0.4" />
  
  <!-- Glowing Location Pin -->
  <g filter="url(#glow)">
    <path d="M 256 80 C 170 80 100 150 100 236 C 100 330 220 440 256 460 C 292 440 412 330 412 236 C 412 150 342 80 256 80 Z" fill="url(#accentGrad)" />
    <!-- Inner Pin Cutout / Background for Contrast -->
    <circle cx="256" cy="236" r="100" fill="#0b0f19" />
  </g>

  <!-- Motorcycle Icon (Sleek Minimalist representation) -->
  <g transform="translate(186, 170)" fill="#f8fafc">
    <!-- Engine Block & Transmission (Center) -->
    <rect x="58" y="58" width="30" height="24" rx="4" fill="#64748b" />
    <path d="M 58 66 L 88 66 M 58 72 L 88 72 M 58 78 L 88 78" stroke="#0b0f19" stroke-width="2" />
    
    <!-- Fuel Tank (Top) -->
    <path d="M 50 44 C 55 32, 80 28, 92 46 L 50 46 Z" fill="#f8fafc" stroke="#f8fafc" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Seat / Tail Cowl -->
    <path d="M 22 50 L 50 50 L 46 40 L 26 40 Z" fill="#f8fafc" stroke="#f8fafc" stroke-width="2" />

    <!-- Exhaust Pipe -->
    <path d="M 52 78 L 10 73" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" />

    <!-- Wheels (Thick Motorcycle Tires) -->
    <!-- Front Wheel -->
    <circle cx="115" cy="78" r="20" fill="none" stroke="#f8fafc" stroke-width="12" />
    <circle cx="115" cy="78" r="8" fill="none" stroke="#0b0f19" stroke-width="4" />
    <!-- Back Wheel -->
    <circle cx="25" cy="78" r="20" fill="none" stroke="#f8fafc" stroke-width="12" />
    <circle cx="25" cy="78" r="8" fill="none" stroke="#0b0f19" stroke-width="4" />

    <!-- Frame and Fork structure -->
    <!-- Front Fork -->
    <line x1="115" y1="78" x2="90" y2="23" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" />
    <!-- Handlebars -->
    <line x1="90" y1="23" x2="78" y2="25" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" />
    <!-- Headlight -->
    <circle cx="98" cy="30" r="6" fill="#f97316" />

    <!-- Main Frame swingarm and structures -->
    <line x1="25" y1="78" x2="58" y2="74" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" />
    <line x1="50" y1="46" x2="58" y2="74" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" />
    <line x1="90" y1="46" x2="90" y2="74" stroke="#f8fafc" stroke-width="8" />
  </g>
</svg>
